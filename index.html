<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#03010a">
<title>Le Dé Fatal — Objectif 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --c0: #03010a;
  --c1: #08041a;
  --c2: #0e0a20;
  --panel: rgba(8,4,22,0.94);
  --b0: rgba(255,255,255,0.04);
  --b1: rgba(255,255,255,0.08);

  --gold:    #c9981e;
  --gold2:   #e8b84b;
  --gold3:   #f5d070;
  --gold-g:  rgba(201,152,30,0.18);

  --red:     #c8202a;
  --red2:    #ef4444;
  --red-g:   rgba(200,32,42,0.22);

  --violet:  #6d28d9;
  --violet2: #a78bfa;
  --violet-g:rgba(109,40,217,0.22);

  --green:   #15803d;
  --green2:  #4ade80;
  --green-g: rgba(21,128,61,0.2);

  --ivory:  #ede8da;
  --muted:  #5a556e;
  --faint:  #1e1830;

  --r: 22px;
  --shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.025) inset;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; background:var(--c0); }

body {
  font-family:'Inter',system-ui,sans-serif;
  background: radial-gradient(ellipse 140% 90% at 35% 0%, #180a38 0%, #0a0420 35%, var(--c0) 70%);
  color:var(--ivory);
  min-height:100dvh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  -webkit-user-select:none; user-select:none;
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

/* ── Starfield ── */
#stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.s { position:absolute; border-radius:50%; background:#fff; animation:twinkle linear infinite; }
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(1); }
  50%      { opacity:var(--op); transform:scale(1.4); }
}

/* ── Card ── */
.card {
  position:relative; z-index:1;
  width:92%; max-width:375px;
  background:var(--panel);
  backdrop-filter:blur(40px) saturate(1.6);
  -webkit-backdrop-filter:blur(40px) saturate(1.6);
  border:1px solid var(--b0);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:24px 20px 20px;
  transition:box-shadow .7s ease, border-color .7s ease;
}
.card::before {
  content:'';
  position:absolute; inset:0;
  border-radius:var(--r);
  background:linear-gradient(155deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events:none;
}
.card.g-red    { box-shadow:0 0 80px var(--red-g), var(--shadow); border-color:rgba(200,32,42,0.15); }
.card.g-green  { box-shadow:0 0 80px var(--green-g), var(--shadow); border-color:rgba(21,128,61,0.15); }
.card.g-violet { box-shadow:0 0 80px var(--violet-g), var(--shadow); border-color:rgba(109,40,217,0.15); }

/* ── Header ── */
.hdr {
  text-align:center; margin-bottom:20px;
  padding-bottom:16px;
  position:relative;
}
.hdr::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:120px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.eyebrow {
  font-size:.58rem; font-weight:500; letter-spacing:4.5px;
  text-transform:uppercase; color:var(--gold); opacity:.65;
  display:block; margin-bottom:7px;
}
h1 {
  font-family:'Cinzel',serif;
  font-size:1.65rem; font-weight:700; letter-spacing:3px;
  background:linear-gradient(135deg, var(--ivory) 30%, var(--gold2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ── Stats ── */
.stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.stat {
  background:rgba(0,0,0,0.28);
  border:1px solid var(--b0); border-radius:12px;
  padding:10px 10px 8px; text-align:center;
  position:relative; overflow:hidden;
  transition:border-color .4s;
}
.stat::after {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,152,30,0.35),transparent);
}
.sl { font-size:.54rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:4px; }
.sv { font-family:'Cinzel',serif; font-size:1.05rem; font-weight:600; color:var(--gold2); }
.sbar { height:2px; background:rgba(255,255,255,0.04); border-radius:2px; margin:5px 10px 0; overflow:hidden; }
.sfill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold3)); border-radius:2px; width:0%; transition:width .8s cubic-bezier(.25,1,.5,1); }

/* ── Face pool ── */
.pool-wrap {
  display:flex; align-items:center; gap:6px;
  margin-bottom:14px;
}
.pool-lbl { font-size:.52rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--muted); writing-mode:vertical-rl; transform:rotate(180deg); flex-shrink:0; }
.pool {
  flex:1; display:flex; justify-content:space-between; gap:4px;
  background:rgba(0,0,0,0.18); padding:6px 8px;
  border-radius:10px; border:1px solid var(--b0);
}
.fp {
  width:30px; height:30px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:.78rem; font-weight:700;
  background:rgba(201,152,30,0.05); border:1px solid rgba(201,152,30,0.18);
  color:var(--gold2); transition:all .5s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.fp.dead {
  background:rgba(200,32,42,0.1); border-color:rgba(200,32,42,0.38);
  color:transparent;
  box-shadow:0 0 14px rgba(200,32,42,0.12);
}
.fp.dead::before {
  content:'✕'; position:absolute; color:var(--red2);
  font-size:.8rem; font-family:'Inter',sans-serif;
  animation:deadIn .3s ease forwards;
}
@keyframes deadIn { from{opacity:0;transform:scale(1.6)} to{opacity:1;transform:scale(1)} }
.fp.dying {
  animation:pulse-red .35s ease;
}
@keyframes pulse-red {
  0%{box-shadow:0 0 0 0 rgba(200,32,42,0.7)}
  70%{box-shadow:0 0 0 8px rgba(200,32,42,0)}
  100%{box-shadow:none}
}

/* ── Round indicators ── */
.rounds {
  display:flex; align-items:center; justify-content:center;
  gap:10px; margin-bottom:16px;
}
.rl { font-size:.52rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.rp {
  width:7px; height:7px; border-radius:50%;
  background:var(--faint); border:1px solid rgba(255,255,255,0.07);
  transition:all .4s ease;
}
.rp.done   { background:var(--gold); border-color:var(--gold2); box-shadow:0 0 7px rgba(201,152,30,0.55); }
.rp.active { background:transparent; border-color:var(--gold2); animation:rpulse 1.8s ease-in-out infinite; }
@keyframes rpulse {
  0%,100%{box-shadow:0 0 4px rgba(201,152,30,0.3)}
  50%    {box-shadow:0 0 12px rgba(201,152,30,0.65)}
}

/* ── Die ── */
.stage {
  display:flex; justify-content:center; align-items:center;
  height:118px; position:relative; margin-bottom:14px;
}

/* Ambient halo behind die */
.halo {
  position:absolute;
  width:130px; height:130px; border-radius:32px;
  pointer-events:none; opacity:0;
  transition:opacity .5s ease;
  filter:blur(20px);
}
.halo.gold   { background:rgba(201,152,30,0.28); opacity:1; }
.halo.red    { background:rgba(200,32,42,0.35); opacity:1; }
.halo.violet { background:rgba(109,40,217,0.32); opacity:1; }
.halo.green  { background:rgba(21,128,61,0.3); opacity:1; }

.die-wrap {
  width:100px; height:100px; position:relative;
  filter:drop-shadow(0 12px 32px rgba(0,0,0,0.75));
}
.die-wrap svg { width:100px; height:100px; }

/* Roll animation */
@keyframes spin {
  0%   { transform:rotate(0deg) scale(1); }
  20%  { transform:rotate(130deg) scale(1.1); }
  55%  { transform:rotate(520deg) scale(1.13); }
  80%  { transform:rotate(880deg) scale(1.06); }
  100% { transform:rotate(1080deg) scale(1); }
}
.rolling { animation:spin 1.3s cubic-bezier(.1,.9,.3,1) forwards; }

/* Settle bounce */
@keyframes settle {
  0%   { transform:scale(1.11); }
  40%  { transform:scale(0.94); }
  70%  { transform:scale(1.03); }
  100% { transform:scale(1); }
}
.settling { animation:settle .4s ease forwards; }

/* Burst ring */
.ring {
  position:absolute; inset:-10px; border-radius:28px;
  pointer-events:none; border:2px solid transparent; opacity:0;
}
@keyframes burst {
  0%   { transform:scale(1); opacity:.9; }
  100% { transform:scale(1.6); opacity:0; }
}
.ring.gold   { border-color:var(--gold2); animation:burst .7s ease-out forwards; }
.ring.red    { border-color:var(--red2);  animation:burst .7s ease-out forwards; }
.ring.violet { border-color:var(--violet2); animation:burst .7s ease-out forwards; }
.ring.green  { border-color:var(--green2); animation:burst .7s ease-out forwards; }

/* ── Info panel ── */
.info {
  background:rgba(0,0,0,0.2);
  border:1px solid var(--b0); border-radius:14px;
  padding:12px 14px; min-height:84px;
  display:flex; flex-direction:column; justify-content:center;
  align-items:center; text-align:center; gap:6px;
  margin-bottom:14px; position:relative; overflow:hidden;
  transition:border-color .5s, background .5s;
}
.info::before {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,152,30,0.3),transparent);
  transition:background .5s;
}
.info.s-red    { border-color:rgba(200,32,42,0.2); background:rgba(200,32,42,0.05); }
.info.s-red::before { background:linear-gradient(90deg,transparent,rgba(200,32,42,0.5),transparent); }
.info.s-green  { border-color:rgba(21,128,61,0.2); background:rgba(21,128,61,0.04); }
.info.s-green::before { background:linear-gradient(90deg,transparent,rgba(21,128,61,0.4),transparent); }
.info.s-violet { border-color:rgba(109,40,217,0.2); background:rgba(109,40,217,0.04); }
.info.s-violet::before { background:linear-gradient(90deg,transparent,rgba(109,40,217,0.4),transparent); }

.itag {
  font-size:.56rem; font-weight:500; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--muted); background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07); padding:3px 12px; border-radius:20px;
  transition:color .3s;
}
.itext { font-size:.82rem; font-weight:300; line-height:1.55; color:var(--ivory); }
.td { color:#f87171; font-weight:500; }
.ts { color:var(--green2); font-weight:500; }
.tv { color:var(--violet2); font-weight:500; }
.tg { color:var(--gold2); font-weight:500; }

/* ── Timer ── */
.timer {
  text-align:center; height:56px; margin-bottom:14px;
  opacity:0; transform:translateY(6px);
  pointer-events:none; transition:opacity .35s ease, transform .35s ease;
}
.timer.on { opacity:1; transform:translateY(0); pointer-events:auto; }
.tdig {
  font-family:'Cinzel',serif; font-size:2.5rem; font-weight:400;
  color:var(--ivory); letter-spacing:4px; line-height:1;
  font-variant-numeric:tabular-nums;
  transition:color .3s;
}
.tdig.warn { color:var(--red2); }
.tlbl { font-size:.52rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); font-weight:500; margin-top:3px; }

/* ── CTA button ── */
.btn {
  width:100%; background:transparent;
  border:1px solid var(--gold); color:var(--gold2);
  padding:15px 24px;
  font-family:'Inter',sans-serif; font-size:.72rem; font-weight:500;
  text-transform:uppercase; letter-spacing:3px;
  border-radius:50px; cursor:pointer;
  transition:background .15s, transform .1s, box-shadow .2s, border-color .3s, color .3s;
  position:relative; overflow:hidden;
}
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(201,152,30,0.1) 0%, transparent 60%);
  opacity:0; transition:opacity .2s;
}
.btn:hover:not(:disabled)::before { opacity:1; }
.btn:active:not(:disabled) { transform:scale(0.97); background:rgba(201,152,30,0.07); }
.btn:disabled { border-color:rgba(255,255,255,0.07); color:var(--muted); cursor:default; }
.btn.v { border-color:var(--violet2); color:var(--violet2); }
.btn.v::before { background:linear-gradient(135deg,rgba(109,40,217,0.12) 0%,transparent 60%); }
.btn.r { border-color:var(--green2); color:var(--green2); }

/* skip */
.skip {
  display:block; width:100%; margin-top:10px;
  background:none; border:none; font-family:'Inter',sans-serif;
  font-size:.62rem; font-weight:400; letter-spacing:1.5px; text-transform:uppercase;
  color:rgba(255,255,255,0.18); cursor:pointer; padding:8px;
  text-decoration:underline; text-underline-offset:3px;
  opacity:0; pointer-events:none; transition:opacity .4s;
}

/* ── Fade-in content ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.card > * { animation:fadeUp .5s ease both; }
.card > *:nth-child(1){animation-delay:.05s}
.card > *:nth-child(2){animation-delay:.1s}
.card > *:nth-child(3){animation-delay:.15s}
.card > *:nth-child(4){animation-delay:.2s}
.card > *:nth-child(5){animation-delay:.25s}
.card > *:nth-child(6){animation-delay:.3s}
.card > *:nth-child(7){animation-delay:.35s}
.card > *:nth-child(8){animation-delay:.38s}
.card > *:nth-child(9){animation-delay:.4s}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="card" id="card">
  <div class="hdr">
   <h1>Le Dé Fatal</h1>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="sl">Score</span>
      <span class="sv" id="u-score">0 / 12</span>
      <div class="sbar"><div class="sfill" id="sbar"></div></div>
    </div>
    <div class="stat">
      <span class="sl">Rounds</span>
      <span class="sv" id="u-rounds">0 / 4</span>
    </div>
  </div>

  <div class="pool-wrap">
    <span class="pool-lbl">Faces</span>
    <div class="pool">
      <div class="fp" id="fp1">1</div>
      <div class="fp" id="fp2">2</div>
      <div class="fp" id="fp3">3</div>
      <div class="fp" id="fp4">4</div>
      <div class="fp" id="fp5">5</div>
      <div class="fp" id="fp6">6</div>
    </div>
  </div>

  <div class="rounds">
    <span class="rl">Progression</span>
    <div class="rp active" id="rp0"></div>
    <div class="rp" id="rp1"></div>
    <div class="rp" id="rp2"></div>
    <div class="rp" id="rp3"></div>
  </div>

  <div class="stage">
    <div class="halo" id="halo"></div>
    <div class="die-wrap" id="die-wrap">
      <div class="ring" id="ring"></div>
      <svg id="dsvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <div class="info" id="info">
    <div class="itag" id="itag">Statut</div>
    <div class="itext" id="itext">Atteignez 12 points. À la fin de chaque round, la face la plus forte restante devient perdante (✕).</div>
  </div>

  <div class="timer" id="timer">
    <div class="tdig" id="tdig">00:00</div>
    <div class="tlbl">Restant</div>
  </div>

  <button class="btn" id="btn" onclick="G.click()">Lancer le dé</button>
  <button class="skip" id="skip" onclick="G.skip()">Passer le chrono</button>
</div>

<script>
/* ── Starfield canvas ── */
(function(){
  const c=document.getElementById('stars');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}
  function init(){
    resize();stars=[];
    for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.9+.2,a:Math.random(),da:(Math.random()*.003+.001)*(Math.random()<.5?1:-1)});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.a+=s.da;
      if(s.a>1||s.a<0)s.da*=-1;
      ctx.globalAlpha=s.a*.35;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  init(); draw();
  // fixed position
  Object.assign(c.style,{position:'fixed',inset:'0',pointerEvents:'none',zIndex:'0'});
})();

/* ── Die SVG renderer ── */
const PIP={
  1:[[50,50]],
  2:[[28,28],[72,72]],
  3:[[28,28],[50,50],[72,72]],
  4:[[28,28],[72,28],[28,72],[72,72]],
  5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,25],[72,25],[28,50],[72,50],[28,75],[72,75]]
};

function renderDie(svg, val, dead=false){
  const q=val==='?';
  const bodyFill   = dead ? 'url(#gd-dead)' : 'url(#gd-live)';
  const strokeCol  = dead ? 'rgba(200,32,42,0.7)' : q ? 'rgba(255,255,255,0.06)' : 'rgba(201,152,30,0.42)';
  const strokeW    = dead||!q ? '1.5' : '1';

  let d=`<defs>
    <linearGradient id="gd-live" x1="0" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#130b24"/>
      <stop offset="100%" stop-color="#07040e"/>
    </linearGradient>
    <linearGradient id="gd-dead" x1="0" y1="0" x2=".7" y2="1">
      <stop offset="0%" stop-color="#1c0609"/>
      <stop offset="100%" stop-color="#0b0203"/>
    </linearGradient>
    <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.09)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="pglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="xglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="92" height="92" rx="20" fill="${bodyFill}" stroke="${strokeCol}" stroke-width="${strokeW}"/>
  <rect x="4" y="4" width="92" height="46" rx="20" fill="url(#sh)"/>
  `;

  if(dead){
    d+=`<line x1="28" y1="28" x2="72" y2="72" stroke="#ef4444" stroke-width="5" stroke-linecap="round" filter="url(#xglow)"/>
        <line x1="72" y1="28" x2="28" y2="72" stroke="#ef4444" stroke-width="5" stroke-linecap="round" filter="url(#xglow)"/>
        <circle cx="50" cy="50" r="24" fill="none" stroke="rgba(239,68,68,0.12)" stroke-width="1"/>`;
  } else if(q){
    d+=`<text x="50" y="65" text-anchor="middle" font-size="42" font-weight="300" fill="rgba(201,152,30,0.22)" font-family="Cinzel,serif">?</text>`;
  } else {
    PIP[val].forEach(([cx,cy])=>{
      d+=`<circle cx="${cx}" cy="${cy}" r="6" fill="#e8b84b" filter="url(#pglow)"/>`;
    });
  }
  svg.innerHTML=d;
}

/* ── Game ── */
const WIN=12, MAX=4;

class Game {
  constructor(){
    this.score=0; this.rounds=0; this.phase='ROLL';
    this.face=0; this.bl=[]; this.rolling=false;
    this._anim=null; this._gt=null; this._sk=null;
  }

  vib(p){ try{navigator.vibrate&&navigator.vibrate(p);}catch(e){} }

  click(){
    if(this.phase==='ROLL')       this.doRoll(false);
    else if(this.phase==='BONUS') this.doRoll(true);
    else if(this.phase==='END')   this.reset();
  }

  doRoll(bonus){
    if(this.rolling) return;
    this.rolling=true;
    const svg=$('dsvg'), wrap=$('die-wrap'), btn=$('btn');
    btn.disabled=true;
    this.clearHalo();

    wrap.classList.remove('settling');
    wrap.classList.add('rolling');

    let f=1;
    this._anim=setInterval(()=>{ f=f%6+1; renderDie(svg,f); },70);
    let vt=setInterval(()=>this.vib(10),65);

    this.tag('Lancer en cours…'); this.txt('La tension monte…'); this.panel('');

    setTimeout(()=>{
      clearInterval(this._anim); clearInterval(vt); this._anim=null;
      this.rolling=false;
      wrap.classList.remove('rolling');
      void wrap.offsetWidth;
      wrap.classList.add('settling');

      const r=Math.floor(Math.random()*6)+1;
      this.face=r;

      if(this.bl.includes(r)){
        renderDie(svg,r,true);
        this.sudden(r);
      } else {
        renderDie(svg,r);
        if(bonus) this.evalBonus();
        else { this.rounds++; this.evalRound(); }
      }
    },1350);
  }

  sudden(f){
    this.phase='END';
    wakeLockOff();
    this.glow('red'); this.burst('red'); this.card('g-red');
    this.vib([350,100,350,100,500]);
    this.tag(`Arrêt brutal — Face noire : ${f}`);
    this.txt(`<span class="td">Face perdante.</span><br>Session interrompue immédiatement. <span class="td" style="font-weight:600">Interdiction de jouir !</span>`);
    this.panel('s-red');
    this.ui();
  }

  evalRound(){
    this.score+=this.face;
    this.glow('gold'); this.burst('gold');
    this.dots();

    if(this.score>=WIN){
      this.phase='EDGING'; this.card('');
      this.vib([80,50,80,50,80,50,300]);
      this.tag(`Objectif atteint ! · +${this.face} pts`);
      this.txt(`<span class="ts">Score ${this.score}/${WIN} — Objectif atteint !</span><br>Masturbez-vous pendant <b>${this.face} minutes</b>. Orgasme autorisé à la fin !`);
      this.panel('s-green');
      this.ui(); this.startTimer(this.face*60); return;
    }

    this.phase='EDGING'; this.card('');
    this.vib(70);
    this.tag(`Round ${this.rounds} / ${MAX} · +${this.face} pts`);
    this.txt(`<span class="tg">Consigne :</span> Masturbez-vous sans jouir pendant <b>${this.face} minutes</b>.<br>La face la plus haute suivante devient perdante.`);
    this.panel(''); this.ui(); this.startTimer(this.face*60);
  }

  evalBonus(){
    this.score+=this.face;
    if(this.score>=WIN){
      this.phase='BTIMER'; this.card('g-violet');
      this.glow('violet'); this.burst('violet');
      this.vib([180,80,180,80,250]);
      this.tag(`Bonus réussi ! · Score : ${this.score}`);
      this.txt(`<span class="tv">Objectif atteint (${this.score}/${WIN}) !</span><br>Masturbez-vous pendant <b>${this.face} minutes</b>. Ruinez votre orgasme à la fin !`);
      this.panel('s-violet'); this.ui(); this.startTimer(this.face*60);
    } else {
      this.phase='END'; this.card('g-red');
      this.glow('red'); this.burst('red');
      this.vib(600);
      this.tag(`Bonus échoué · ${this.score}/${WIN}`);
      this.txt(`<span class="td">Le compte n'y est pas.</span><br><span class="td">Interdiction de jouir !</span>`);
      this.panel('s-red'); this.ui();
    }
  }

  startTimer(s){
    clearInterval(this._gt); clearTimeout(this._sk);
    wakeLockOn();
    const sk=$('skip'); sk.style.opacity='0'; sk.style.pointerEvents='none';
    this._sk=setTimeout(()=>{
      if(this.phase==='EDGING'||this.phase==='BTIMER'){
        sk.style.opacity='1'; sk.style.pointerEvents='auto';
      }
    },5000);
    const fmt=n=>`${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`;
    const el=$('tdig'); el.textContent=fmt(s); el.classList.remove('warn');
    this._gt=setInterval(()=>{
      s--; el.textContent=fmt(s);
      if(s<=30) el.classList.add('warn');
      if(s<=0) this.onEnd();
    },1000);
  }

  onEnd(){
    clearInterval(this._gt); this._gt=null; clearTimeout(this._sk);
    wakeLockOff();
    $('skip').style.opacity='0'; $('skip').style.pointerEvents='none';
    this.vib([100,70,100]);

    if(this.phase==='BTIMER'){
      this.phase='END'; this.card('g-violet');
      this.tag('Bonus validé !');
      this.txt(`<span class="tv">Temps écoulé !</span><br>Vous gagnez le droit à un <span class="tv">orgasme ruiné</span>. Montez au point de non-retour et coupez tout.`);
      this.panel('s-violet'); this.ui(); return;
    }

    // Destroy highest clean face (uniquement si on n'a pas fini les 4 rounds)
    if(this.rounds < MAX){
      for(let i=6;i>=1;i--){
        if(!this.bl.includes(i)){
          this.bl.push(i);
          const el=$(`fp${i}`);
          el.classList.add('dying');
          setTimeout(()=>el.classList.add('dead'),350);
          break;
        }
      }
    }

    const pct=Math.round(this.bl.length/6*100);

    if(this.score>=WIN){
      this.phase='END'; this.card('g-green');
      this.glow('green'); this.burst('green');
      this.tag('Victoire !');
      this.txt(`<span class="ts">Félicitations !</span><br><span class="ts" style="font-size:1.05rem;font-weight:600;display:block;margin-top:6px">VOUS AVEZ LE DROIT DE JOUIR.</span>`);
      this.panel('s-green'); this.ui(); return;
    }

    if(this.rounds>=MAX){
      this.phase='BONUS'; this.card('g-violet');
      this.tag('Score insuffisant');
      this.txt(`Fin des 4 rounds. Score : ${this.score}/${WIN}.<br><span class="tv">Lancer ultime : </span><span class="td">${pct}% de risque de perdre.</span><br>Tentez le tout !`);
      this.panel('s-violet'); this.ui(); return;
    }

    this.phase='ROLL'; this.card('');
    this.tag('Chrono terminé');
    this.txt(`Un nouvelle face perdante s'ajoute. Risque de perdre au prochain lancer : <span class="td">${pct}%</span>.`);
    this.panel(''); this.ui();
  }

  skip(){
    clearInterval(this._gt); this._gt=null;
    this.onEnd();
  }

  /* ── Visual helpers ── */
  glow(t){
    const h=$('halo'); h.className='halo';
    void h.offsetWidth; h.classList.add(t);
  }
  clearHalo(){ $('halo').className='halo'; }
  burst(t){
    const r=$('ring'); r.className='ring';
    void r.offsetWidth; r.className=`ring ${t}`;
  }
  card(cls){ $('card').className=`card${cls?' '+cls:''}`; }
  panel(s){ $('info').className=`info${s?' '+s:''}`; }
  tag(t){ $('itag').textContent=t; }
  txt(t){ $('itext').innerHTML=t; }

  dots(){
    for(let i=0;i<MAX;i++){
      const d=$(`rp${i}`);
      if(i<this.rounds) d.className='rp done';
      else if(i===this.rounds) d.className='rp active';
      else d.className='rp';
    }
  }

  ui(){
    $('u-score').textContent=`${this.score} / ${WIN}`;
    $('u-rounds').textContent=`${Math.min(this.rounds,MAX)} / ${MAX}`;
    $('sbar').style.width=`${Math.min(this.score/WIN*100,100)}%`;

    const btn=$('btn'), tmr=$('timer');
    btn.className='btn';

    switch(this.phase){
      case 'ROLL':
        btn.textContent='Lancer le dé'; btn.disabled=false;
        tmr.classList.remove('on'); break;

      case 'EDGING': case 'BTIMER':
        btn.textContent='Session en cours…'; btn.disabled=true;
        tmr.classList.add('on'); break;

      case 'BONUS':
        btn.textContent='Lancer ultime'; btn.disabled=false;
        btn.classList.add('v'); tmr.classList.remove('on'); break;

      case 'END':
        btn.textContent='Nouvelle partie'; btn.disabled=false;
        btn.classList.add('r'); tmr.classList.remove('on'); break;
    }
  }

  reset(){
    this.score=0; this.rounds=0; this.phase='ROLL';
    this.face=0; this.bl=[]; this.rolling=false;
    clearInterval(this._gt); clearInterval(this._anim); clearTimeout(this._sk);
    this._gt=this._anim=this._sk=null;
    wakeLockOff();

    $('sbar').style.width='0%';
    $('skip').style.opacity='0'; $('skip').style.pointerEvents='none';
    $('tdig').classList.remove('warn');

    renderDie($('dsvg'),'?');
    this.clearHalo(); this.card(''); this.panel('');

    for(let i=1;i<=6;i++){
      const fp=$(`fp${i}`);
      fp.className='fp'; fp.textContent=i;
    }

    this.tag('Statut');
    this.txt('Atteignez 12 points. À la fin de chaque round, la face la plus haute restante devient perdante (✕).');
    for(let i=0;i<MAX;i++){
      const d=$(`rp${i}`);
      d.className=i===0?'rp active':'rp';
    }
    this.ui();
  }
}

const $=id=>document.getElementById(id);

/* ── Wake Lock ── */
let _wl=null;
async function wakeLockOn(){
  if(!('wakeLock' in navigator)) return;
  try{ _wl=await navigator.wakeLock.request('screen'); }catch(e){}
}
function wakeLockOff(){
  if(_wl){ _wl.release(); _wl=null; }
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&(G.phase==='EDGING'||G.phase==='BTIMER')) wakeLockOn();
});

const G=new Game();
renderDie($('dsvg'),'?');
</script>
